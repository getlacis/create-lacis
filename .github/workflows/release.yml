name: Release

"on":
  repository_dispatch:
    types: [lacis-released]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Sync version with lacis
        run: |
          npm version ${{ github.event.client_payload.version }} --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ github.event.client_payload.version }} [skip ci]"
          git push origin HEAD:master

      - run: npm ci

      - run: npm run build

      - run: npx tsx scripts/validate.ts

      - name: Publish
        run: npm publish --provenance --access public
