name: Release

"on":
  repository_dispatch:
    types: [lacis-released]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Sync version with lacis
        run: npm version ${{ github.event.client_payload.version }} --no-git-tag-version

      - run: npm ci

      - run: npm run build

      - run: npx tsx scripts/validate.ts

      - name: Publish
        run: npm publish --provenance --access public
